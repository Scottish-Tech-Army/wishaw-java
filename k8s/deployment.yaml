apiVersion: apps/v1
kind: Deployment
metadata:
  name: wishaw-java
  labels:
    app: wishaw-java
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wishaw-java
  template:
    metadata:
      labels:
        app: wishaw-java
    spec:
      containers:
        - name: wishaw-java
          image: wishaw-java:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: k8s
            - name: SERVER_PORT
              value: "8080"
            - name: UI_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: wishaw-java-config
                  key: UI_ORIGIN
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: wishaw-java-secrets
                  key: JWT_SECRET
            - name: DB_URL
              valueFrom:
                configMapKeyRef:
                  name: wishaw-java-config
                  key: DB_URL
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: wishaw-java-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wishaw-java-secrets
                  key: DB_PASSWORD
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
