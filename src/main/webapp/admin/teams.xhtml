<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<ui:composition template="/WEB-INF/templates/layout.xhtml">
    <ui:param name="title" value="Teams - Admin"/>
    <ui:define name="content">
        <div class="page-container">
            <div class="page-header">
                <h1>Team Management</h1>
                <p:commandButton value="Add Team" icon="pi pi-plus"
                                 onclick="PF('addTeamDlg').show()"
                                 type="button" styleClass="btn btn-primary"/>
            </div>

            <h:form id="teamsTableForm">

            <p:messages showDetail="true" closable="true"/>

            <p:dataTable value="#{teamBean.teams}" var="t"
                         paginator="true" rows="10"
                         reflow="true"
                         styleClass="data-table" emptyMessage="No teams found."
                         aria-label="Teams table">
                <p:column headerText="Team Name" sortBy="#{t.teamName}">
                    <h:outputText value="#{t.teamName}"/>
                </p:column>
                <p:column headerText="Centre">
                    <h:outputText value="#{t.centre.name}"/>
                </p:column>
                <p:column headerText="Description">
                    <h:outputText value="#{t.description}"/>
                </p:column>
                <p:column headerText="Actions" styleClass="actions-col">
                    <p:commandButton icon="pi pi-pencil" title="Edit"
                                     action="#{teamBean.prepareEdit(t)}"
                                     oncomplete="PF('editTeamDlg').show()"
                                     update="@form :editTeamForm" ajax="true"
                                     styleClass="btn btn-sm btn-secondary"/>
                    <p:commandButton icon="pi pi-trash" title="Delete"
                                     action="#{teamBean.deleteTeam()}"
                                     update="@form" ajax="true"
                                     styleClass="btn btn-sm btn-danger">
                        <p:confirm header="Confirm" message="Delete team #{t.teamName}?"
                                   icon="pi pi-exclamation-triangle"/>
                    </p:commandButton>
                </p:column>
            </p:dataTable>

            </h:form>

            <!-- Add Team Dialog -->
            <p:dialog header="Add Team" widgetVar="addTeamDlg" modal="true" closable="true"
                      resizable="false" styleClass="dialog-form">
                <h:form id="addTeamForm">
                    <div class="form-group">
                        <label for="teamName">Team Name <span aria-hidden="true">*</span></label>
                        <p:inputText id="teamName" value="#{teamBean.newTeam.teamName}"
                                     required="true" styleClass="form-control"/>
                    </div>
                    <div class="form-group">
                        <label for="teamCentre">Centre <span aria-hidden="true">*</span></label>
                        <p:selectOneMenu id="teamCentre" value="#{teamBean.newTeam.centre}"
                                         required="true" styleClass="form-control"
                                         converter="#{entityConverter}">
                            <f:selectItem itemLabel="Select Centre" itemValue=""/>
                            <f:selectItems value="#{teamBean.centres}" var="c"
                                           itemLabel="#{c.name}" itemValue="#{c}"/>
                        </p:selectOneMenu>
                    </div>
                    <div class="form-group">
                        <label for="teamDesc">Description</label>
                        <p:inputTextarea id="teamDesc" value="#{teamBean.newTeam.description}"
                                         rows="3" styleClass="form-control"/>
                    </div>
                    <div class="dialog-actions">
                        <p:commandButton value="Save" action="#{teamBean.saveTeam()}"
                                         ajax="true" update="@form"
                                         styleClass="btn btn-primary" icon="pi pi-check"
                                         oncomplete="if(!args.validationFailed) PF('addTeamDlg').hide()"/>
                        <p:commandButton value="Cancel" onclick="PF('addTeamDlg').hide()"
                                         type="button" styleClass="btn btn-secondary"/>
                    </div>
                </h:form>
            </p:dialog>

            <!-- Edit Team Dialog -->
            <p:dialog header="Edit Team" widgetVar="editTeamDlg" modal="true" closable="true"
                      resizable="false" styleClass="dialog-form">
                <h:form id="editTeamForm">
                    <h:panelGroup rendered="#{teamBean.selectedTeam != null}" layout="block">
                        <div class="form-group">
                            <label for="editTeamName">Team Name</label>
                            <p:inputText id="editTeamName" value="#{teamBean.selectedTeam.teamName}"
                                         styleClass="form-control"/>
                        </div>
                        <div class="form-group">
                            <label for="editTeamDesc">Description</label>
                            <p:inputTextarea id="editTeamDesc" value="#{teamBean.selectedTeam.description}"
                                             rows="3" styleClass="form-control"/>
                        </div>
                    </h:panelGroup>
                    <div class="dialog-actions">
                        <p:commandButton value="Update" action="#{teamBean.updateTeam()}"
                                         ajax="true" update="@form"
                                         styleClass="btn btn-primary" icon="pi pi-check"
                                         oncomplete="if(!args.validationFailed) PF('editTeamDlg').hide()"/>
                        <p:commandButton value="Cancel" onclick="PF('editTeamDlg').hide()"
                                         type="button" styleClass="btn btn-secondary"/>
                    </div>
                </h:form>
            </p:dialog>

            <p:confirmDialog global="true" showEffect="fade" hideEffect="fade">
                <p:commandButton value="Confirm" type="button" styleClass="btn btn-danger"/>
                <p:commandButton value="Cancel" type="button"
                                 onclick="PF('confirmDialogWidget').hide()"
                                 styleClass="btn btn-secondary"/>
            </p:confirmDialog>
        </div>
    </ui:define>
</ui:composition>
</html>
