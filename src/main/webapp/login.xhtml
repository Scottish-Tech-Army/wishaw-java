<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
<h:head>
    <title>Login - Wishaw YMCA Esports</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="theme-color" content="#1a1a2e"/>
    <link rel="manifest" href="#{request.contextPath}/manifest.json"/>
    <link rel="stylesheet" href="#{request.contextPath}/resources/css/app.css" type="text/css"/>
</h:head>
<h:body styleClass="login-body">
    <main class="login-container" role="main" aria-label="Login Page">
        <div class="login-card" role="region" aria-labelledby="loginTitle">
            <div class="login-header">
                <span class="login-icon" aria-hidden="true">&#127918;</span>
                <h1 id="loginTitle">Wishaw YMCA Esports</h1>
                <p>Digital Badging Portal</p>
            </div>

            <!-- Plain HTML form — Spring Security processes POST to /login directly -->
            <form id="loginForm" method="post" action="#{request.contextPath}/login">
                <input type="hidden" name="${_csrf.parameterName}" value="${_csrf.token}"/>

                <h:panelGroup rendered="#{param.error != null}" layout="block"
                              styleClass="alert alert-danger" role="alert">
                    Invalid username or password. Please try again.
                </h:panelGroup>

                <h:panelGroup rendered="#{param.logout != null}" layout="block"
                              styleClass="alert alert-info" role="status">
                    You have been successfully logged out.
                </h:panelGroup>

                <div class="form-group">
                    <label for="username">Email / Username</label>
                    <input id="username" type="text" name="username"
                           class="form-control"
                           placeholder="Enter your email"
                           aria-label="Username or Email"
                           aria-required="true"
                           autocomplete="username"
                           required="required"/>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input id="password" type="password" name="password"
                           class="form-control"
                           placeholder="Enter your password"
                           aria-label="Password"
                           aria-required="true"
                           autocomplete="current-password"
                           required="required"/>
                </div>

                <button type="submit" class="btn btn-primary btn-full" aria-label="Sign In">
                    Sign In
                </button>

                <div class="login-footer">
                    <span class="login-help">Having trouble? Contact your centre admin.</span>
                </div>
            </form>
        </div>
    </main>
</h:body>
</html>
