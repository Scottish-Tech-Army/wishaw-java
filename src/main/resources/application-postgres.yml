# ============================================================
# PostgreSQL Database Profile
# ============================================================
# Activate with: SPRING_PROFILES_ACTIVE=postgres
# Add postgresql dependency to pom.xml before use
# ============================================================
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ltcdb
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: false
# ============================================================
# H2 In-Memory Database Profile (Default for development)
# ============================================================
# To switch to a real database, activate a different profile:
#   - Set SPRING_PROFILES_ACTIVE=mysql   (for MySQL)
#   - Set SPRING_PROFILES_ACTIVE=postgres (for PostgreSQL)
# ============================================================
spring:
  datasource:
    url: jdbc:h2:mem:ltcdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update

