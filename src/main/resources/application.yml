spring:
  application:
    name: wishaw-java
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:h2}
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB
  jpa:
    open-in-view: false

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  pattern:
    level: "%5p [corr:%X{correlationId}]"

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  cors:
    allowed-origins:
      - ${UI_ORIGIN:http://localhost:3000}
      - http://127.0.0.1:3000
  jwt:
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me-change-me-change-me}
    access-token-minutes: ${JWT_ACCESS_TOKEN_MINUTES:60}
    refresh-token-days: ${JWT_REFRESH_TOKEN_DAYS:7}
  seed:
    enabled: ${APP_SEED_ENABLED:true}
