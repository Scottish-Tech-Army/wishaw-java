components:
  securitySchemes:
    SessionCookieAuth:
      type: apiKey
      in: cookie
      name: JSESSIONID
      description: Session cookie returned by POST /api/v1/auth/login.
  parameters:
    UserId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    PlayerId:
      name: playerId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    CentreId:
      name: centreId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    GroupId:
      name: groupId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    ModuleId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    ChallengeId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    ScheduleItemId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    EnrollmentId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    BatchId:
      name: batchId
      in: path
      required: true
      schema:
        type: integer
        format: int64
  responses:
    BadRequest:
      description: Request was syntactically valid but semantically invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    ValidationError:
      description: Bean validation failed for one or more request fields.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    Unauthorized:
      description: Authentication is missing, invalid, or expired.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    Forbidden:
      description: Authenticated user does not have the required role.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    NotFound:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    Conflict:
      description: Request conflicts with current state, usually a duplicate resource.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    ServerError:
      description: An unexpected backend error occurred.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
  schemas:
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string
          format: password
    CreateUserRequest:
      type: object
      required:
        - username
        - password
        - displayName
        - role
      properties:
        username:
          type: string
        password:
          type: string
          format: password
        displayName:
          type: string
        role:
          $ref: '#/components/schemas/Role'
        centreId:
          type: integer
          format: int64
          nullable: true
        groupId:
          type: integer
          format: int64
          nullable: true
        externalRef:
          type: string
          nullable: true
    UpdateUserRequest:
      type: object
      properties:
        displayName:
          type: string
        role:
          $ref: '#/components/schemas/Role'
        centreId:
          type: integer
          format: int64
          nullable: true
        groupId:
          type: integer
          format: int64
          nullable: true
        externalRef:
          type: string
          nullable: true
    UpdateActiveStatusRequest:
      type: object
      required:
        - active
      properties:
        active:
          type: boolean
    LinkParentRequest:
      type: object
      required:
        - parentUserId
        - playerUserId
      properties:
        parentUserId:
          type: integer
          format: int64
        playerUserId:
          type: integer
          format: int64
        relationshipLabel:
          type: string
          nullable: true
    CreateCentreRequest:
      type: object
      required:
        - name
        - code
      properties:
        name:
          type: string
        code:
          type: string
    CreateGroupRequest:
      type: object
      required:
        - name
        - centreId
      properties:
        name:
          type: string
        gameName:
          type: string
          nullable: true
        ageBand:
          type: string
          nullable: true
        centreId:
          type: integer
          format: int64
    CreateModuleRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        gameName:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
    CreateChallengeRequest:
      type: object
      required:
        - name
        - badgeCategoryId
        - points
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        badgeCategoryId:
          type: integer
          format: int64
        points:
          type: integer
          minimum: 0
        displayOrder:
          type: integer
          default: 0
    CreateScheduleItemRequest:
      type: object
      properties:
        weekNumber:
          type: integer
        sessionFocus:
          type: string
          nullable: true
        linkedChallengeId:
          type: integer
          format: int64
          nullable: true
        sessionPlanUrl:
          type: string
          nullable: true
        sessionSlidesUrl:
          type: string
          nullable: true
        displayOrder:
          type: integer
    CreateEnrollmentRequest:
      type: object
      required:
        - playerId
        - moduleId
      properties:
        playerId:
          type: integer
          format: int64
        moduleId:
          type: integer
          format: int64
        groupId:
          type: integer
          format: int64
          nullable: true
    UpdateEnrollmentStatusRequest:
      type: object
      required:
        - status
      properties:
        status:
          $ref: '#/components/schemas/EnrollmentStatus'
    SetLegacyPointsRequest:
      type: object
      required:
        - playerId
        - badgeCategoryId
        - legacyPoints
      properties:
        playerId:
          type: integer
          format: int64
        badgeCategoryId:
          type: integer
          format: int64
        legacyPoints:
          type: integer
          minimum: 0
    AwardChallengeRequest:
      type: object
      required:
        - playerId
        - challengeId
      properties:
        playerId:
          type: integer
          format: int64
        challengeId:
          type: integer
          format: int64
        notes:
          type: string
          nullable: true
    ImportPlayerMappingRequest:
      type: object
      properties:
        playerMappings:
          type: object
          additionalProperties:
            type: integer
            format: int64
      example:
        playerMappings:
          player1: 1
          player2: 2
    AuthResponse:
      type: object
      properties:
        userId:
          type: integer
          format: int64
        username:
          type: string
        displayName:
          type: string
        role:
          $ref: '#/components/schemas/Role'
        message:
          type: string
    UserSummaryResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        displayName:
          type: string
        role:
          $ref: '#/components/schemas/Role'
        active:
          type: boolean
        centreId:
          type: integer
          format: int64
          nullable: true
        centreName:
          type: string
          nullable: true
        groupId:
          type: integer
          format: int64
          nullable: true
        groupName:
          type: string
          nullable: true
        externalRef:
          type: string
          nullable: true
    CentreResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        code:
          type: string
        active:
          type: boolean
    GroupResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        gameName:
          type: string
          nullable: true
        ageBand:
          type: string
          nullable: true
        centreId:
          type: integer
          format: int64
        centreName:
          type: string
        active:
          type: boolean
    ModuleSummaryResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        gameName:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        active:
          type: boolean
        approved:
          type: boolean
    ModuleDetailResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        gameName:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        active:
          type: boolean
        approved:
          type: boolean
        challenges:
          type: array
          items:
            $ref: '#/components/schemas/ModuleChallengeResponse'
        scheduleItems:
          type: array
          items:
            $ref: '#/components/schemas/ModuleScheduleItemResponse'
    ModuleChallengeResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
          nullable: true
        points:
          type: integer
        badgeCategoryId:
          type: integer
          format: int64
        badgeCategoryName:
          type: string
        displayOrder:
          type: integer
        active:
          type: boolean
    ModuleScheduleItemResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        weekNumber:
          type: integer
        sessionFocus:
          type: string
          nullable: true
        linkedChallengeId:
          type: integer
          format: int64
          nullable: true
        sessionPlanUrl:
          type: string
          nullable: true
        sessionSlidesUrl:
          type: string
          nullable: true
        displayOrder:
          type: integer
    EnrollmentResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        playerId:
          type: integer
          format: int64
        playerName:
          type: string
        moduleId:
          type: integer
          format: int64
        moduleName:
          type: string
        status:
          $ref: '#/components/schemas/EnrollmentStatus'
    BadgeProgressResponse:
      type: object
      properties:
        badgeCategoryId:
          type: integer
          format: int64
        categoryCode:
          type: string
        categoryName:
          type: string
        legacyPoints:
          type: integer
        earnedPoints:
          type: integer
        totalPoints:
          type: integer
        currentLevel:
          type: string
          nullable: true
    PlayerProfileResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        displayName:
          type: string
        centreName:
          type: string
          nullable: true
        groupName:
          type: string
          nullable: true
        badgeProgress:
          type: array
          items:
            $ref: '#/components/schemas/BadgeProgressResponse'
        overallTotalPoints:
          type: integer
    LeaderboardEntryResponse:
      type: object
      properties:
        rank:
          type: integer
        playerId:
          type: integer
          format: int64
        displayName:
          type: string
        centreName:
          type: string
          nullable: true
        groupName:
          type: string
          nullable: true
        totalPoints:
          type: integer
        highestLevel:
          type: string
          nullable: true
    ImportPreviewResponse:
      type: object
      properties:
        batchId:
          type: integer
          format: int64
        fileName:
          type: string
        status:
          $ref: '#/components/schemas/ImportStatus'
        totalRows:
          type: integer
        validRows:
          type: integer
        errorRows:
          type: integer
        warningRows:
          type: integer
        unmappedPlayers:
          type: array
          items:
            type: string
        rows:
          type: array
          items:
            $ref: '#/components/schemas/ImportRowDetail'
    ImportRowDetail:
      type: object
      properties:
        rowNumber:
          type: integer
        status:
          $ref: '#/components/schemas/ImportRowStatus'
        message:
          type: string
        rawData:
          type: string
    ImportCommitResponse:
      type: object
      properties:
        batchId:
          type: integer
          format: int64
        status:
          $ref: '#/components/schemas/ImportStatus'
        totalAwardsCreated:
          type: integer
        totalPlayersAffected:
          type: integer
        message:
          type: string
    ApiErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        path:
          type: string
    Role:
      type: string
      enum:
        - SUPER_ADMIN
        - CENTRE_ADMIN
        - PLAYER
        - PARENT
    EnrollmentStatus:
      type: string
      enum:
        - ASSIGNED
        - IN_PROGRESS
        - COMPLETED
        - ARCHIVED
    ImportStatus:
      type: string
      enum:
        - UPLOADED
        - PREVIEW_READY
        - COMMITTED
        - FAILED
    ImportRowStatus:
      type: string
      enum:
        - OK
        - WARNING
        - ERROR
        - SKIPPED