      summary: Add a schedule item to a module
      operationId: createScheduleItem
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/ModuleId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateScheduleItemRequest'
      responses:
        '201':
