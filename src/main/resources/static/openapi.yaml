  /api/v1/admin/import/csv/upload:
    post:
      tags:
        - Import
      summary: Upload a CSV file and create an import preview batch
      operationId: uploadCsv
      security:
        - SessionCookieAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Parsed batch preview.
          content:
            application/json:
              schema:
