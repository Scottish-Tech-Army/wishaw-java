openapi: 3.0.3
info:
  title: Wishaw YMCA Badge API
  version: 0.0.1
  description: |
    OpenAPI contract for the Wishaw YMCA Esports badging backend.

    This API is designed for a separate React frontend and uses session-based authentication.
    Successful login establishes a JSESSIONID cookie; subsequent calls must include that cookie.
servers:
  - url: http://localhost:8080
    description: Local development server
tags:
  - name: Auth
  - name: Admin Users
  - name: Centres
  - name: Groups
  - name: Modules
  - name: Enrollments
  - name: Progress
  - name: Import
  - name: Player
  - name: Parent
  - name: Leaderboards
paths:
  /api/v1/auth/login:
    post:
      tags:
        - Auth
      summary: Log in and create a backend session
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              username: superadmin
              password: admin123
      responses:
        '200':
          description: Login succeeded and a session cookie is returned.
          headers:
            Set-Cookie:
              description: Session cookie carrying the authenticated Spring session.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'
  /api/v1/auth/logout:
    post:
      tags:
        - Auth
      summary: End the current backend session
      operationId: logout
      security: []
      responses:
        '204':
          description: Session invalidated.
        '500':
          $ref: '#/components/responses/ServerError'
  /api/v1/auth/me:
    get:
      tags:
        - Auth
      summary: Get the currently authenticated user
      operationId: getAuthenticatedUser
      security:
        - SessionCookieAuth: []
      responses:
        '200':
          description: Authenticated user summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'
  /api/v1/admin/users:
    post:
      tags:
        - Admin Users
      summary: Create a user account
      operationId: createUser
      security:
        - SessionCookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSummaryResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/ServerError'
    get:
      tags:
        - Admin Users
      summary: List users
      operationId: listUsers
      security:
        - SessionCookieAuth: []
      responses:
        '200':
          description: All users visible to the admin scope.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserSummaryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'
  /api/v1/admin/users/{id}:
    get:
      tags:
        - Admin Users
      summary: Get a user by id
      operationId: getUser
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: User found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSummaryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    put:
      tags:
        - Admin Users
      summary: Update a user account
      operationId: updateUser
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Updated user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSummaryResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/ServerError'
  /api/v1/admin/users/{id}/status:
    patch:
      tags:
        - Admin Users
      summary: Activate or deactivate a user
      operationId: updateUserStatus
      security:
        - SessionCookieAuth: []
      parameters:
