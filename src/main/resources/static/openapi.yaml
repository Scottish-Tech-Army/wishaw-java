      tags:
        - Modules
      summary: Add a challenge to a module
      operationId: createChallenge
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/ModuleId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChallengeRequest'
      responses:
        '201':
          description: Updated module detail including the new challenge.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModuleDetailResponse'
        '400':
