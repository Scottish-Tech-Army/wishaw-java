spring.application.name=wishaw-java

# H2 Database (dev/demo - swap to PostgreSQL for production)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.sql.init.mode=always
spring.jpa.hibernate.ddl-auto=none
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=false

# JWT Configuration
jwt.secret=WishawYMCAEsportsAcademySecretKeyForJWTTokenGeneration2026!
jwt.expiration-ms=86400000

# OpenAPI / Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.packages-to-scan=org.scottishtecharmy.wishaw_java

# -- Logging -------------------------------------------------------------------
logging.level.root=INFO
logging.level.org.scottishtecharmy.wishaw_java=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [traceId=%X{traceId:-} spanId=%X{spanId:-}] %-5level %logger{36} - %msg%n

# -- Actuator / Observability --------------------------------------------------
management.endpoints.web.exposure.include=health,info,metrics,prometheus,loggers
management.endpoint.health.show-details=when_authorized
management.endpoint.health.probes.enabled=true
management.info.env.enabled=true
management.metrics.tags.application=${spring.application.name}

# -- Micrometer Tracing -------------------------------------------------------
management.tracing.sampling.probability=1.0
management.tracing.enabled=true

# -- App Info ------------------------------------------------------------------
info.app.name=Wishaw YMCA Digital Badging API
info.app.description=Backend API for the Wishaw YMCA Esports Academy
info.app.version=1.0.0
