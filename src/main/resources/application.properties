spring.application.name=wishaw-java

# H2 Database
spring.datasource.url=jdbc:h2:file:./data/wishawdb;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false


# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JSF / PrimeFaces
joinfaces.faces.project-stage=Production
joinfaces.primefaces.theme=vela-blue
joinfaces.faces.default-suffix=.xhtml

# Server
server.port=8080
server.servlet.session.timeout=30m
server.servlet.session.tracking-modes=cookie

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.org.scottishtecharmy=INFO
logging.level.org.springframework.security=WARN
