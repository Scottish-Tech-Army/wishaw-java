# Application
spring.application.name=wishaw-java
server.port=8080

# H2 Database (switch to PostgreSQL/MySQL later by changing these properties)
spring.datasource.url=jdbc:h2:mem:wishawdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# H2 Console (dev only)
spring.h2.console.enabled=${APP_H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# FRONTEND_INTEGRATION: set allowed origins for local React dev server here.
app.cors.allowed-origins=http://localhost:4000,http://localhost:5173

# Seed admin credentials (local dev only - change in production)
app.seed.admin-username=superadmin
app.seed.admin-password=admin123
