server:
  port: 8080
  servlet:
    context-path: /api

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:h2}
  application:
    name: ltc-backend
  jpa:
    open-in-view: false
    generate-ddl: true
    hibernate:
      ddl-auto: update
    show-sql: true

# Swagger / OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# Application custom properties
ltc:
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173
  security:
    jwt-secret: LTC_SUPER_SECRET_KEY_CHANGE_IN_PRODUCTION_2026
    jwt-expiration-ms: 86400000

