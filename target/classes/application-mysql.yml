# ============================================================
# MySQL Database Profile
# ============================================================
# Activate with: SPRING_PROFILES_ACTIVE=mysql
# Add mysql-connector-java dependency to pom.xml before use
# ============================================================
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ltcdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: false

