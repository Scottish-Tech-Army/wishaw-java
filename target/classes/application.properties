spring.application.name=wishaw-java

# ── Logging ──────────────────────────────────────────────────────────────────
# Log every incoming HTTP request (method, URI, status, timing)
logging.level.org.springframework.web.servlet.DispatcherServlet=DEBUG

# ── MySQL database ────────────────────────────────────────────────────────────
# Point these at your local MySQL instance. Create the schema first:
#   CREATE DATABASE wishaw_db;
spring.datasource.url=jdbc:mysql://localhost:3307/wishaw_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
# "update" keeps existing data and applies schema changes.
# Switch to "create" or "create-drop" during early development if needed.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Jackson ──────────────────────────────────────────────────────────────────
spring.jackson.property-naming-strategy=LOWER_CAMEL_CASE

# ── JWT ──────────────────────────────────────────────────────────────────────
app.jwt.secret=c2VjcmV0S2V5Rm9yV2lzaGF3WU1DQUVzcG9ydHNBY2FkZW15MjAyNlNwcmluZ0Jvb3RCYWNrZW5k
app.jwt.expiration-ms=86400000

# ── Server ───────────────────────────────────────────────────────────────────
server.port=8080
