spring:
  config:
    activate:
      on-profile: k8s
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
management:
  endpoint:
    health:
      probes:
        enabled: true
app:
  seed:
    enabled: ${APP_SEED_ENABLED:false}
